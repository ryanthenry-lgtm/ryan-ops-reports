<!DOCTYPE html><html lang=en><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>Sophie — Sales Incentive Analysis</title><style>
:root{--g:#16a34a;--g2:#15803d;--navy:#1f3864;--ink:#1a202c;--mut:#64748b;--line:#e5e8ee;--bg:#f4f6f9;--plum:#6a4a7a;--rust:#9c5a2e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:16px}
header{background:linear-gradient(135deg,var(--navy),#2b4a7a);color:#fff;border-radius:16px;padding:20px;margin-bottom:14px}
header h1{font-size:20px;font-weight:700;letter-spacing:-.2px}
header .sub{opacity:.85;font-size:12.5px;margin-top:6px}
.badge{display:inline-block;background:rgba(255,255,255,.16);border-radius:999px;padding:3px 10px;font-size:11px;margin-top:10px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.card h2{font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--navy);margin-bottom:12px;font-weight:700}
.sect{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin:24px 4px 10px;padding-left:10px;border-left:4px solid var(--navy);color:var(--navy)}
.sect.plum{border-color:var(--plum);color:var(--plum)}.sect.rust{border-color:var(--rust);color:var(--rust)}
.hero{background:linear-gradient(135deg,#052e1a,#064e3b);color:#eafff3}
.hero h2{color:#8ef0b8}.hero b{color:#fff}
.three{display:grid;grid-template-columns:1fr;gap:8px;margin-top:6px}
.three .t{background:rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;font-size:12.5px}
.three .t b{color:#8ef0b8}.three .t.p b{color:#d8b7ec}.three .t.r b{color:#f0c39a}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.tile{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.tile .v{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.5px}
.tile .l{font-size:10.5px;color:var(--mut);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.modeler{border:2px solid var(--g)}.modeler.plum{border-color:var(--plum)}.modeler.rust{border-color:var(--rust)}
.ctl{margin:14px 0}
.ctl label{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:6px}
.ctl label span{color:var(--g2);font-weight:800;font-size:16px}
.plum .ctl label span{color:var(--plum)}.rust .ctl label span{color:var(--rust)}
input[type=range]{width:100%;height:6px;border-radius:999px;background:#d7e3db;-webkit-appearance:none;appearance:none;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--g);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.25);border:3px solid #fff}
.plum input[type=range]::-webkit-slider-thumb{background:var(--plum)}.rust input[type=range]::-webkit-slider-thumb{background:var(--rust)}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--g);cursor:pointer;border:3px solid #fff}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{font-size:11.5px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--mut)}
.chip.on{background:var(--g);color:#fff;border-color:var(--g);font-weight:700}
.out{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.out .b{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.out .b.big{grid-column:span 2;background:#052e1a;color:#fff;border:none}
.plum .out .b.big{background:#3d2b4a}.rust .out .b.big{background:#5a341a}
.out .b .v{font-size:24px;font-weight:800;color:var(--navy)}
.out .b.big .v{color:#8ef0b8;font-size:30px}.plum .out .b.big .v{color:#d8b7ec}.rust .out .b.big .v{color:#f0c39a}
.out .b .l{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.out .b.big .l{color:rgba(255,255,255,.7)}
.dowmini{display:flex;gap:4px;margin-top:12px}
.dowmini .d{flex:1;text-align:center;font-size:10px;color:var(--mut)}
.dowmini .d .n{display:block;font-weight:800;color:var(--ink);font-size:13px}
.dowmini .d.hot .n{color:var(--g2)}.plum .dowmini .d.hot .n{color:var(--plum)}.rust .dowmini .d.hot .n{color:var(--rust)}
.row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.row:last-child{border:none}
.bar{height:22px;border-radius:5px;min-width:2px;background:var(--g)}
.bar.wk{background:#93c5b0}.bar.plum{background:var(--plum)}.bar.rust{background:var(--rust)}
.lab{width:34px;font-weight:700;color:var(--navy)}
.val{width:96px;text-align:right;font-variant-numeric:tabular-nums;color:var(--mut)}.val b{color:var(--ink)}
.srv{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.srv .top{display:flex;justify-content:space-between;align-items:baseline}
.srv .nm{font-weight:800;color:var(--navy);font-size:14.5px}
.srv .avg{font-size:20px;font-weight:800;color:var(--g2)}
.srv .meta{font-size:11.5px;color:var(--mut);margin-top:1px}
.srv .dw{display:flex;gap:3px;margin-top:10px}
.srv .dw .c{flex:1;text-align:center}
.srv .dw .c .bar2{height:34px;display:flex;align-items:flex-end;justify-content:center}
.srv .dw .c .bar2 i{display:block;width:70%;background:#bfe3cd;border-radius:3px 3px 0 0}
.srv .dw .c.wknd .bar2 i{background:var(--g)}
.srv .dw .c .t{font-size:9px;color:var(--mut);margin-top:2px}.srv .dw .c .amt{font-size:9.5px;color:var(--ink);font-weight:600}
details summary{cursor:pointer;font-size:13px;font-weight:700;color:var(--navy);padding:6px 0}
.note{font-size:12px;color:var(--mut);margin-top:8px}
.foot{text-align:center;font-size:11px;color:var(--mut);padding:14px 0 24px}
.gate{max-width:400px;margin:14vh auto 0;padding:16px}
.gatecard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px 24px;text-align:center;box-shadow:0 10px 30px rgba(16,24,40,.10)}
.gate .lk{font-size:30px;margin-bottom:10px}
.gate h1{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:6px}
.gate p{font-size:12.5px;color:var(--mut);margin-bottom:18px;line-height:1.5}
.gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:10px;outline:none}
.gate input:focus{border-color:var(--navy)}
.gate button{width:100%;padding:12px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.gate button:hover{background:#152a4d}
.gate .gerr{color:#dc2626;font-size:12.5px;margin-top:10px;min-height:16px;font-weight:600}
.statrow{display:flex;gap:8px;margin-top:10px;padding:8px 6px;background:rgba(255,255,255,.06);border-radius:8px;font-size:11.5px;color:rgba(255,255,255,.72)}
.statrow span{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,.12)}
.statrow span:last-child{border:none}
.statrow b{color:#fff;font-size:14px;display:block;font-variant-numeric:tabular-nums}
.hl{display:flex;gap:14px;margin-top:10px}
.hlcol{flex:1;min-width:0}
.hlh{font-size:9.5px;font-weight:800;letter-spacing:.5px;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:4px}
.hr{display:flex;justify-content:space-between;gap:6px;font-size:11.5px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.09)}
.hr:last-child{border:none}
.hr .amt{font-weight:800;color:#fff;font-variant-numeric:tabular-nums}
.hr .ctx{color:rgba(255,255,255,.5);font-size:10px;white-space:nowrap;align-self:center}

async function unlock(){var pw=document.getElementById('pw').value,err=document.getElementById('gerr');err.textContent='';try{var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);KEY=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},KEY,b64(ENC.ct));var o=JSON.parse(new TextDecoder().decode(pt));document.getElementById('main').innerHTML=o.h;D=o.d;document.getElementById('gate').style.display='none';document.getElementById('main').style.display='block';renderAll();}catch(e){err.textContent='Wrong password — try again.';}}
function renderAll(){var $=id=>document.getElementById(id),money=n=>'$'+Math.round(n).toLocaleString();

$('badge').textContent='Servers $'+D.KPI.totsrv.toLocaleString()+' ('+D.KPI.srvpct+'% of sales) · bars ring the rest';
$('k1').textContent=D.KPI.nights;$('k2').textContent=money(D.KPI.avg);$('k3').textContent=money(D.KPI.med);
const SCW=D.SN.filter(s=>s.cw), stot=SCW.length;
$('s_chips').innerHTML=[1200,1500,1800,2000].map(c=>`<span class="chip" data-t="${c}">$${c.toLocaleString()}</span>`).join('');
function srec(){const t=+$('s_thr').value,b=+$('s_bon').value;$('s_tv').textContent='$'+t.toLocaleString();$('s_bv').textContent='$'+b;
 const q=SCW.filter(s=>s.net>=t).length,pw=q/D.NW,hr=stot?q/stot:0;
 $('s_mo').textContent=money(pw*b*4.33);$('s_wk').textContent=pw.toFixed(1);$('s_hr').textContent=Math.round(hr*100)+'%';
 const byd=D.DOW.map(dw=>({dw,n:SCW.filter(s=>s.net>=t&&s.dow===dw).length}));
 $('s_dow').innerHTML=byd.map(x=>`<div class="d ${(x.dw=='Fri'||x.dw=='Sat')?'hot':''}"><span class="n">${x.n}</span>${x.dw}</div>`).join('');
 const wknd=byd.filter(x=>x.dw=='Fri'||x.dw=='Sat').reduce((a,x)=>a+x.n,0);
 $('s_note').innerHTML=`At <b>$${t.toLocaleString()}</b>: ~<b>${pw.toFixed(1)}/wk</b> · <b>${money(pw*b*4.33)}/mo</b> · ${money(pw*b*52)}/yr. ${Math.round(wknd/Math.max(q,1)*100)}% land Fri/Sat.`;
 document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',+c.dataset.t===t));}
$('s_thr').oninput=srec;$('s_bon').oninput=srec;
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{$('s_thr').value=c.dataset.t;srec();});
$('dowbars').innerHTML=D.dowstats.map(s=>{if(!s.n)return `<div class="row"><span class="lab">${s.dow}</span><div style="flex:1;color:var(--mut);font-size:12px">no server shifts</div></div>`;
 const w=Math.round(s.mean/D.maxmean*100),h=(s.dow=='Fri'||s.dow=='Sat');
 return `<div class="row"><span class="lab">${s.dow}</span><div class="bar ${h?'':'wk'}" style="width:${w}%"></div><span class="val"><b>${money(s.mean)}</b> ×${s.spn}</span></div>`;}).join('');
function sc(a){const mx=Math.max(...D.DOW.map(d=>a.dow[d]))||1;
 const dw=D.DOW.map(d=>{const v=a.dow[d],h=Math.round(v/mx*100),w=(d=='Fri'||d=='Sat');
  return `<div class="c ${w?'wknd':''}"><div class="bar2"><i style="height:${v?Math.max(h,6):0}%"></i></div><div class="amt">${v?('$'+(v/1000).toFixed(1)+'k'):'–'}</div><div class="t">${d}</div></div>`;}).join('');
 return `<div class="srv"><div class="top"><div><div class="nm">${a.name}</div><div class="meta">${a.n} nights · median ${money(a.med)} · best ${money(a.mx)} · hit $1.5k on ${a.hits['1500']} nights</div></div><div class="avg">${money(a.avg)}</div></div><div class="dw">${dw}</div></div>`;}
$('coreServers').innerHTML=D.servers.filter(s=>s.core).map(sc).join('');
$('occServers').innerHTML=D.servers.filter(s=>!s.core).map(a=>`<div class="row"><span style="flex:1">${a.name}</span><span class="val">${a.n} nt · avg <b>${money(a.avg)}</b></span></div>`).join('');
function initBar(pfx,key,cls){const bd=D.BARDATA[key];
 $(pfx+'_stat').innerHTML=`Avg <b>${money(bd.mean)}</b>/night · median ${money(bd.med)} · best ${money(bd.mx)} · open ${bd.n} nights`;
 $(pfx+'_bars').innerHTML=bd.dm.map(x=>{const w=Math.round(x.mean/bd.maxdm*100),h=(x.dow=='Fri'||x.dow=='Sat');
  return `<div class="row"><span class="lab">${x.dow}</span><div class="bar ${cls}" style="width:${w}%;opacity:${h?1:.55}"></div><span class="val"><b>${money(x.mean)}</b></span></div>`;}).join('');
 function rec(){const g=+$(pfx+'_goal').value,bo=+$(pfx+'_bon').value;
  $(pfx+'_gv').textContent='$'+g.toLocaleString();$(pfx+'_bv').textContent='$'+bo;
  const cw=bd.nights.filter(x=>x.cw),q=cw.filter(x=>x.net>=g).length,pw=q/D.NW,pc=cw.length?q/cw.length:0;
  $(pfx+'_mo').textContent=money(pw*bo*4.33);$(pfx+'_wk').textContent=pw.toFixed(1);$(pfx+'_pc').textContent=Math.round(pc*100)+'%';
  const byd=D.DOW.map(dw=>({dw,n:cw.filter(x=>x.net>=g&&x.dow===dw).length}));
  $(pfx+'_dow').innerHTML=byd.map(x=>`<div class="d ${x.n>0?'hot':''}"><span class="n">${x.n}</span>${x.dw}</div>`).join('');
  $(pfx+'_note').innerHTML=`Goal <b>$${g.toLocaleString()}</b>: ~<b>${pw.toFixed(1)} nights/wk</b> · team bonus <b>${money(pw*bo*4.33)}/mo</b>. ~1–2 bartenders share it (2–3 weekends).`;}
 $(pfx+'_goal').oninput=rec;$(pfx+'_bon').oninput=rec;rec();}
srec();
initBar('up','Upstairs','plum');
initBar('dn','Downstairs','rust');

}
window.addEventListener('DOMContentLoaded',function(){document.getElementById('go').addEventListener('click',unlock);document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});document.getElementById('pw').focus();});</script></body></html>
